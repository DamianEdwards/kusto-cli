name: PR

on:
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  validate-powershell-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate PowerShell script syntax
        shell: pwsh
        run: ./scripts/Verify-PowerShellSyntax.ps1

  build:
    needs: [validate-powershell-scripts]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build
        uses: ./.github/actions/build
        with:
          validate-native-aot: 'true'
          aot-runtime-identifier: linux-x64

  test:
    needs: [validate-powershell-scripts]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore kusto.slnx --nologo --tl:off

      - name: Build
        run: dotnet build kusto.slnx --configuration Release --no-restore --nologo --tl:off -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test kusto.slnx --configuration Release --no-build --nologo --tl:off --logger "trx;LogFileName=test-results-${{ matrix.os }}.trx" --logger "html;LogFileName=test-results-${{ matrix.os }}.html" --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: |
            ./test-results/*.trx
            ./test-results/*.html
          retention-days: 30
  
  publish-aot:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
          - runner: ubuntu-22.04
            rid: linux-x64
          - runner: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build and validate NativeAOT publish
        uses: ./.github/actions/build
        with:
          validate-native-aot: 'true'
          aot-runtime-identifier: ${{ matrix.rid }}

