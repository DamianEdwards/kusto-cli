name: Build
description: Setup .NET, restore, and build the solution

inputs:
  version:
    description: Semantic version to inject into the build.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      shell: bash
      run: dotnet restore kusto.slnx --nologo --tl:off

    - name: Build
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          dotnet build kusto.slnx --configuration Release --no-restore --nologo --tl:off -p:Version=${{ inputs.version }} -p:ContinuousIntegrationBuild=true
        else
          dotnet build kusto.slnx --configuration Release --no-restore --nologo --tl:off -p:ContinuousIntegrationBuild=true
        fi
